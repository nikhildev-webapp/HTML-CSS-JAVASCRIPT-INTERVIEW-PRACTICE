<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Todo List</h1>
    </div>
    <div class="container">
        <input type="text" name="todo" id="todo" placeholder="Add your todos">
        <button id="saveTodo">Save</button>
    </div>
    <div class="todo">
        <h3>Your Todos:</h3>
        <ul id="todoList">

        </ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
