<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call to action button</title>
    <style>
        .cta-btn{
            border:none;
            border-radius:10px;
            padding:12px 24px;
            background-color:rgb(8, 8, 203);
            color:white;
        }

        .cta-btn:hover{
            background-color:darkblue;
            transition: background-color 0.3s ease;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <h3>Creating a CTA Button</h3>
    <button class="cta-btn">Get Started</button>
</body>
</html>
